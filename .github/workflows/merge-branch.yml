# IMPORTANT: secrets.CICD_GITHUB_TOKEN must be newly generated every year.
# One year is the longest expiration time that can be chosen for custom access tokens.
# Secrets are set here for the Org: https://github.com/organizations/adadaptedinc/settings/secrets/actions
# Fine-grained tokens can be generated here: https://github.com/settings/tokens?type=beta
#   - Expiration: 1 year out
#   - Resource Owner: adadaptedinc
#   - Repository Access: All Repositories
#   - Permissions:
#       - Repository Permissions:
#           - Actions: Read and Write
#           - Contents: Read and Write
#       - Organization Permissions: none

name: Merge Branch
on:
    pull_request:
        branches: [main]
        types:
            - opened
            - reopened
            - synchronize
    push:
        branches:
            - "**"
        tags-ignore:
            - "**"
permissions:
    id-token: write # Required for GCP authentication
    contents: read
jobs:
    validation:
        name: validation # Used for a Github environment protection ruleset. The name must be the same for the ruleset to work.
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24
            - name: NPM Install
              run: npm ci
            - name: NPM Audit Fix
              run: npm audit fix
            - name: Prettier Validation
              run: npm run prettier
            - name: Linting Validation
              run: npm run lint
            - name: Build Validation
              run: npm run compile
    create_release_version:
        if: ${{ github.event_name == 'push' && github.ref_name == 'main'}}
        needs: [validation]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            new_tag: ${{steps.tag_version.outputs.new_tag}}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: main
            - name: Bump version and push tag
              id: tag_version
              uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
              with:
                  github_token: ${{secrets.CICD_GITHUB_TOKEN}}
            - name: Create a GitHub release
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
              with:
                  token: ${{secrets.CICD_GITHUB_TOKEN}}
                  tag: ${{steps.tag_version.outputs.new_tag}}
                  name: Release ${{steps.tag_version.outputs.new_tag}}
                  body: ${{steps.tag_version.outputs.changelog}}
    deploy_production:
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        needs: [validation, create_release_version]
        uses: ./.github/workflows/deploy-environment.yml
        with:
            environment: pro
            new_tag: ${{needs.create_release_version.outputs.new_tag}}
        secrets: inherit
